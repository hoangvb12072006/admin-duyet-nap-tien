<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <title>Hệ Thống Duyệt Thẻ - Hoang Kun Store</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #1e272e; color: #fff; padding: 30px; }
        .admin-box { max-width: 1100px; margin: 0 auto; background: #2f3542; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-family: 'Oswald'; text-align: center; color: #fbc531; text-transform: uppercase; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; background: #3d4451; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #4b5463; }
        th { background: #57606f; color: #fbc531; text-transform: uppercase; font-size: 14px; }
        .btn { border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-family: 'Quicksand'; transition: 0.3s; }
        .btn-ok { background: #2ecc71; color: #fff; margin-right: 5px; }
        .btn-no { background: #e74c3c; color: #fff; }
        .btn:hover { opacity: 0.8; transform: scale(1.05); }
        .badge-wait { background: #f1c40f; color: #000; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h2><i class="fa-solid fa-user-shield"></i> QUẢN LÝ DUYỆT THẺ CÀO</h2>
        <table>
            <thead>
                <tr>
                    <th>Khách hàng</th>
                    <th>Loại thẻ</th>
                    <th>Mệnh giá</th>
                    <th>Seri / Mã thẻ</th>
                    <th>Thời gian</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody id="list-cards">
                </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, get, remove } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCt20_2svxHHPgp_tttW7MiaS0vTU1knS0",
            authDomain: "hoangkunstore.firebaseapp.com",
            databaseURL: "https://hoangkunstore-default-rtdb.firebaseio.com",
            projectId: "hoangkunstore"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // Load danh sách thẻ đang chờ
        const rechargeRef = ref(database, 'recharge_logs');
        onValue(rechargeRef, (snapshot) => {
            const listCards = document.getElementById("list-cards");
            listCards.innerHTML = "";
            const data = snapshot.val();
            
            if (data) {
                Object.keys(data).reverse().forEach(key => {
                    const card = data[key];
                    if(card.status === "Chờ duyệt") {
                        const row = `<tr>
                            <td><b>${card.username}</b></td>
                            <td>${card.cardType}</td>
                            <td style="color: #2ecc71; font-weight: bold;">${new Intl.NumberFormat('vi-VN').format(card.amount)}đ</td>
                            <td><small>${card.serial}</small><br><b>${card.pin}</b></td>
                            <td><small>${card.time}</small></td>
                            <td>
                                <button class="btn btn-ok" onclick="handleCard('${key}', '${card.username}', ${card.amount}, 'duyet')">DUYỆT</button>
                                <button class="btn btn-no" onclick="handleCard('${key}', '${card.username}', 0, 'huy')">HỦY</button>
                            </td>
                        </tr>`;
                        listCards.innerHTML += row;
                    }
                });
            } else {
                listCards.innerHTML = "<tr><td colspan='6'>Không có thẻ nào đang chờ duyệt sếp ơi!</td></tr>";
            }
        });

        // Hàm xử lý Duyệt/Hủy
        window.handleCard = async (key, user, amount, action) => {
            const confirm = await Swal.fire({
                title: action === 'duyet' ? 'Duyệt nạp tiền?' : 'Hủy bỏ thẻ này?',
                text: action === 'duyet' ? `Cộng ${amount}đ cho ${user}?` : `Thẻ của ${user} bị sai?`,
                icon: 'question', showCancelButton: true, confirmButtonColor: action === 'duyet' ? '#2ecc71' : '#e74c3c'
            });

            if (confirm.isConfirmed) {
                if (action === 'duyet') {
                    // 1. Cộng tiền cho User
                    const userRef = ref(database, 'users/' + user);
                    const userSnap = await get(userRef);
                    const currentMoney = (userSnap.val() && userSnap.val().money) ? userSnap.val().money : 0;
                    await update(userRef, { money: currentMoney + amount });
                    
                    // 2. Cập nhật trạng thái trong log
                    await update(ref(database, 'recharge_logs/' + key), { status: 'Thành công' });
                    Swal.fire('Đã duyệt!', 'Tiền đã cộng vào tài khoản khách.', 'success');
                } else {
                    // Hủy thẻ
                    await update(ref(database, 'recharge_logs/' + key), { status: 'Thẻ sai/Đã dùng' });
                    Swal.fire('Đã hủy!', 'Thẻ đã bị từ chối.', 'info');
                }
            }
        };
    </script>
</body>
</html>
